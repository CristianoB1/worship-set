<mat-dialog-content>
  <form action="">
    <div class="p-2">
      <h2 class="text-2xl font-bold text-gray-800 mb-4">Qual ID deseja deletar?</h2>
      <input type="number" class="border border-gray-300 rounded p-2 w-full" placeholder="Digite o ID aqui" [(ngModel)]="id" name="id">
    </div>
    <div class="p-2 flex justify-between">
      <button class="bg-gray-500 text-white px-4 py-2 rounded hover:bg-gray-600 focus:outline-none focus:ring focus:border-gray-300">Cancelar</button>
      <button class="bg-red-500 text-white px-4 py-2 rounded hover:bg-red-600 focus:outline-none focus:ring focus:border-red-300" (click)="deleteMusica()">Deletar</button>
    </div>
  </form>
</mat-dialog-content>
